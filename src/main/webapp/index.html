<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Signin</title>
</head>
<body>
	<h2>User Signin</h2>
	<form action="login" method="post">
		<div>
			<label>Email</label>
			<input type="email" name="email"/>
		</div>
		<br>
		<div>
			<label>Password</label>
			<input type="password" name="password"/>
		</div>
		<br>
		<div>
			<input type="submit" value="signin"/>
		</div>

	</form>
</body>
</html>
