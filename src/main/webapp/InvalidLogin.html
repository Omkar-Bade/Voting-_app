<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invalid Login - E-Voting App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="auth-container">
        <div class="card status-card">
            <div class="status-icon icon-error">
                ✕
            </div>
            <h2>Authentication Failed</h2>
            <p>The email or password you entered is incorrect. Please verify your credentials and try again.</p>
            <div class="card-footer">
                <a href="index.html" class="btn btn-primary btn-block">Try Again</a>
            </div>
        </div>
    </main>
</body>
</html>
