<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vote Registered - E-Voting App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="auth-container">
        <div class="card status-card">
            <div class="status-icon icon-success">
                ✓
            </div>
            <h2>Vote Registered!</h2>
            <p>Your vote has been securely recorded in the system. Thank you for participating in the election.</p>
            <div class="card-footer">
                <a href="logout" class="btn btn-primary btn-block">Secure Logout</a>
            </div>
        </div>
    </main>
</body>
</html>
